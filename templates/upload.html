<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Upload Footage - NearMiss</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}" />
</head>
<body>
  <main class="container page">
    <header class="topbar">
      <a class="brand" href="{{ url_for('index') }}">Near<span>Miss</span></a>
      <nav class="topnav">
        <a href="{{ url_for('index') }}">Home</a>
        <a href="{{ url_for('history') }}">History</a>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
      </nav>
    </header>

    <section class="card hero hero-glow">
      <h1>Analyze New Footage</h1>
      <p>Upload traffic video and pin the map location to run AI near-miss analysis.</p>
    </section>

    {% if error %}
      <div class="alert">{{ error }}</div>
    {% endif %}

    <section class="grid-2">
      <form method="POST" enctype="multipart/form-data" class="card" id="uploadForm">
        <h2 class="section-title">Input Details</h2>

        <label for="video">Traffic Video (MP4/MOV/AVI/MKV)</label>
        <input id="video" name="video" type="file" accept="video/*" required />

        <label for="location_name">Location Name (optional)</label>
        <input id="location_name" name="location_name" type="text" placeholder="Example: MG Road Junction, Kochi" />

        <label for="incident_time">Incident Time (for time-based classification)</label>
        <input id="incident_time" name="incident_time" type="time" />

        <label for="latitude">Coordinates (from history or map)</label>
        <div class="coord-grid">
          <input id="latitude" name="latitude" type="number" step="any" placeholder="Latitude" required />
          <input id="longitude" name="longitude" type="number" step="any" placeholder="Longitude" required />
        </div>

        <div class="action-row">
          <button class="btn-secondary" id="applyCoordsBtn" type="button">Use Coordinates</button>
          <button class="btn-secondary" id="lookupLocationBtn" type="button">Auto-Fill Location Name</button>
        </div>

        <p id="coordLookupStatus" class="muted"></p>
        <p id="coords" class="muted">No location selected</p>
        <p id="processingStatus" class="muted"></p>

        <button class="btn" type="submit" id="submitBtn">Process Video</button>
      </form>

      <section class="card">
        <h2 class="section-title">Pinpoint Location</h2>
        <p class="muted">Click map to set location.</p>
        <div id="map"></div>
      </section>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="{{ url_for('static', filename='js/upload.js') }}"></script>
</body>
</html>
